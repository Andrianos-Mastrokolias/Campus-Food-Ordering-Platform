name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_LEMON_BAY_017A4E303 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "./frontend"
          api_location: ""
          output_location: "dist"
        env:
          VITE_FIREBASE_API_KEY: AIzaSyAodPISMTOM4irn-cLtWz6Zj5yBRHYsuVM
          VITE_FIREBASE_AUTH_DOMAIN: campus-food-app-f3973.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: campus-food-app-f3973
          VITE_FIREBASE_STORAGE_BUCKET: campus-food-app-f3973.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: 278743038373
          VITE_FIREBASE_APP_ID: 1:278743038373:web:8029f79ce906d7c6cb104c

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_LEMON_BAY_017A4E303 }}
          action: "close"
