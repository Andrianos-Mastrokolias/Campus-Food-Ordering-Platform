# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Vite React app to Azure Web App - campus-food-app

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: "AIzaSyAodPISMTOM4irn-cLtWz6Zj5yBRHYsuVM"
          VITE_FIREBASE_AUTH_DOMAIN: "campus-food-app-f3973.firebaseapp.com"
          VITE_FIREBASE_PROJECT_ID: "campus-food-app-f3973"
          VITE_FIREBASE_STORAGE_BUCKET: "campus-food-app-f3973.firebasestorage.app"
          VITE_FIREBASE_MESSAGING_SENDER_ID: "278743038373"
          VITE_FIREBASE_APP_ID: "1:278743038373:web:8029f79ce906d7c6cb104c"
          VITE_EMAILJS_SERVICE_ID: "service_mf385rd"
          VITE_EMAILJS_ORDER_READY_TEMPLATE_ID: "template_smmjg2n"
          VITE_EMAILJS_ADMIN_TEMPLATE_ID: "template_1ifhtx5"
          VITE_EMAILJS_PUBLIC_KEY: "l49SFIgiSKq2z_imm"
          VITE_ADMIN_NOTIFICATION_EMAIL: "2704947@students.wits.ac.za"

      - name: Upload frontend dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-dist
          path: ./frontend/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download frontend dist artifact
        uses: actions/download-artifact@v4
        with:
          name: react-dist
          path: .

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'campus-food-app'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_822156E8B16C4ACA94795455766C552A }}
